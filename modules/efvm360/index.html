<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#008C7E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="EFVM 360 — Simulador de condução ferroviária da Estrada de Ferro Vitória a Minas">

  <title>EFVM 360 — Simulador de Condução | T4 Trilho 4.0</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚂</text></svg>">

  <!-- Design System -->
  <link rel="stylesheet" href="../../shared/css/t4-design-system.css">
  <link rel="stylesheet" href="../../shared/css/t4-components.css">
  <link rel="stylesheet" href="../../shared/css/t4-animations.css">

  <!-- Módulo CSS -->
  <link rel="stylesheet" href="css/efvm360.css">

  <!-- Previne flash de conteúdo não estilizado -->
  <style>
    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      z-index: 1;
    }

    .efvm-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      gap: 16px;
    }

    .efvm-loading-icon {
      font-size: 3rem;
      animation: t4-pulse 2s ease-in-out infinite;
    }

    .efvm-loading-text {
      color: var(--text-secondary, #94a3b8);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <!-- Background effects -->
  <div class="t4-bg-glow t4-bg-glow-teal"></div>
  <div class="t4-bg-glow t4-bg-glow-cyan"></div>

  <!-- App wrapper -->
  <div class="t4-app module-efvm360">
    <!-- Module header -->
    <div class="t4-module-header">
      <a href="../../index.html" class="t4-back-btn">← T4</a>
      <h1 class="t4-module-title">EFVM 360</h1>
    </div>

    <!-- Container principal -->
    <div id="app">
      <div class="efvm-loading">
        <div class="efvm-loading-icon">🚂</div>
        <div class="efvm-loading-text">Carregando simulador...</div>
        <div class="t4-loader"></div>
      </div>
    </div>
  </div>

  <!-- Shared JS -->
  <script src="../../shared/js/t4-core.js"></script>
  <script src="../../shared/js/t4-storage.js"></script>
  <script src="../../shared/js/t4-router.js"></script>
  <script src="../../shared/js/t4-auth.js"></script>
  <script src="../../shared/js/t4-notifications.js"></script>

  <!-- Module JS (ordem de dependência) -->
  <script src="js/efvm360-physics.js"></script>
  <script src="js/efvm360-scenarios.js"></script>
  <script src="js/efvm360-scoring.js"></script>
  <script src="js/efvm360-hud.js"></script>
  <script src="js/efvm360-simulator.js"></script>
  <script src="js/efvm360-app.js"></script>
</body>
</html>
